; PlatformIO Project Configuration File
;
; Teensy 4.1 is now the primary target for the active soccer robot apps/tests.
; Stale legacy AVR environments that pointed to deleted source files were removed
; so the build matrix reflects what is actually present in /src today.

[teensy41_base]
platform = teensy
board = teensy41
framework = arduino
monitor_speed = 115200
build_flags =
  -std=gnu++17
lib_extra_dirs = lib

[env:demoStriker]
extends = teensy41_base
lib_deps =
    Wire
build_src_filter = -<*> +<demoStriker.cpp>

[env:teensy41_striker]
extends = env:demoStriker

[env:demoGoalie]
extends = teensy41_base
lib_deps =
    Wire
build_src_filter = -<*> +<demoGoalie.cpp>

[env:BNOReadings]
extends = teensy41_base
monitor_speed = 9600
lib_deps =
    adafruit/Adafruit Unified Sensor
    adafruit/Adafruit BNO055 @ ^1.5.0
build_src_filter = -<*> +<tests/BNOReadings.cpp>

[env:I2CScan]
extends = teensy41_base
build_src_filter = -<arduino.cpp> -<tests/*> +<tests/I2CScan.cpp>

[env:individualMotors]
extends = teensy41_base
lib_deps =
    Wire
build_src_filter = -<*> +<tests/individualMotors.cpp>

[env:motorsSquare]
extends = teensy41_base
lib_deps =
    adafruit/Adafruit Unified Sensor
    adafruit/Adafruit BNO055 @ ^1.5.0
build_src_filter = -<*> +<tests/motorsSquare.cpp>

[env:getBallAngle]
extends = teensy41_base
build_src_filter = -<*> +<tests/getBallAngle.cpp>

[env:PIDLookForBall]
extends = teensy41_base
lib_deps =
    adafruit/Adafruit Unified Sensor
    adafruit/Adafruit BNO055 @ ^1.5.0
build_src_filter = -<*> +<tests/PIDLookForBall.cpp>

[env:PixyTest]
extends = teensy41_base
lib_compat_mode = soft
lib_deps =
    arduino12/pixy2 @ ^1.0.4
build_src_filter = -<*> +<tests/PixyTest.cpp>

[env:getBallAngleWithPixy]
extends = teensy41_base
lib_compat_mode = soft
lib_deps =
    adafruit/Adafruit BNO055 @ ^1.5.0
    Wire
    SPI
    adafruit/Adafruit Unified Sensor @ ^1.1.15
build_src_filter = -<*> +<tests/getBallAngleWithPixy.cpp>

[env:PIDLookForBallWithPixy]
extends = teensy41_base
lib_compat_mode = soft
lib_deps =
    adafruit/Adafruit BNO055 @ ^1.5.0
    Wire
    SPI
    adafruit/Adafruit Unified Sensor
build_src_filter = -<*> +<tests/PIDLookForBallWithPixy.cpp>

[env:PIDStickIntoOneDirection2]
extends = teensy41_base
lib_deps =
    Wire
build_src_filter = -<*> +<tests/PIDStickIntoOneDirection2.cpp>

[env:IMUtest]
extends = teensy41_base
lib_deps =
    Wire
build_src_filter = -<*> +<tests/IMUtest.cpp>

[env:straightLineReaction]
extends = teensy41_base
lib_deps =
    Wire
build_src_filter = -<*> +<tests/straightLineReaction.cpp>

[env:avoidLine]
extends = teensy41_base
lib_deps =
    Wire
build_src_filter = -<*> +<tests/avoidLineWithPhotos.cpp>

[env:avoidLineWithPhotos]
extends = env:avoidLine

[env:teensy41_mux_test]
extends = teensy41_base
build_src_filter = -<*> +<tests/Multiplexer_Readings.cpp>

[env:blink]
extends = teensy41_base
build_src_filter = -<*> +<tests/blink.cpp>
