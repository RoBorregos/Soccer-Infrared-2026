[env:BNOReadings]
platform = atmelavr
board = megaatmega2560
framework = arduino
lib_deps =
    ArduinoSTL
    adafruit/Adafruit Unified Sensor
    adafruit/Adafruit BNO055 @ ^1.5.0
build_src_filter= -<*> +<tests/BNOReadings.cpp>

